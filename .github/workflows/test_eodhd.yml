name: EODHD 테스트

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests pandas
      - name: 테스트
        env:
          EODHD_TOKEN: ${{ secrets.EODHD_TOKEN }}
        run: python eodhd_utils.py