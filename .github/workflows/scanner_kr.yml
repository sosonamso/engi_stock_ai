name: 국장 스캐너 (EODHD)

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  scan_kr:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas numpy lightgbm

      - name: 캐시 로드
        uses: actions/cache@v4
        with:
          path: raw_data/
          key: ohlcv-${{ hashFiles('tickers_us.csv', 'tickers_kr.csv') }}
          restore-keys: ohlcv-

      - name: 스캐너 실행
        env:
          EODHD_TOKEN: ${{ secrets.EODHD_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner_kr.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scanner_kr_raw.csv scanner_kr_all.csv
          git diff --staged --quiet || git commit -m "국장 스캐너 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push