name: OHLCV 수집

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas numpy

      - name: 캐시 로드
        uses: actions/cache@v4
        with:
          path: raw_data/
          key: ohlcv-${{ hashFiles('tickers_us.csv', 'tickers_kr.csv') }}
          restore-keys: ohlcv-

      - name: OHLCV 수집
        env:
          EODHD_TOKEN: ${{ secrets.EODHD_TOKEN }}
        run: python collect_ohlcv.py

      - name: 캐시 저장
        uses: actions/cache/save@v4
        with:
          path: raw_data/
          key: ohlcv-${{ hashFiles('tickers_us.csv', 'tickers_kr.csv') }}