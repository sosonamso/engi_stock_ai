name: 국장 멀티 모델 검증

on:
  workflow_dispatch:

jobs:
  multi_train_kr:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install pandas numpy lightgbm xgboost scikit-learn
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: 학습
        run: python multi_train_kr.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feat_cols_kr.pkl best_model_name_kr.txt rf_oos_kr.csv
          git add model_lgbm_kr.txt model_xgb_kr.json model_rf_kr.pkl 2>/dev/null || true
          git diff --staged --quiet || git commit -m "국장 멀티 모델 검증 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push