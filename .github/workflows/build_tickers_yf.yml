name: 티커 메타데이터 수집 yfinance (분기 수동)

on:
  workflow_dispatch:

jobs:
  build_tickers_yf:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests pandas yfinance

      - name: 티커 수집
        env:
          EODHD_TOKEN: ${{ secrets.EODHD_TOKEN }}
        run: python build_tickers_yf.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tickers_us_yf.csv tickers_kr_yf.csv
          git diff --staged --quiet || git commit -m "티커 메타데이터 yf 업데이트 $(date +'%Y-%m-%d')"
          git push