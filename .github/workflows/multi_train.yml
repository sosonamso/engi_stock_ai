name: 멀티 모델 검증

on:
  workflow_dispatch:

jobs:
  multi_train:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install pandas numpy lightgbm xgboost scikit-learn
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: 멀티 모델 학습
        run: python multi_train.py

      - name: 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model_lgbm_us.txt model_xgb_us.json model_rf_us.pkl feat_cols_lgbm_us.pkl best_model_name.txt
          git diff --staged --quiet || git commit -m "멀티 모델 검증 $(date +'%Y-%m-%d')"
          git push